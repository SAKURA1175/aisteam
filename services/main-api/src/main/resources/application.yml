server:
  port: ${MAIN_API_PORT:8080}
  shutdown: graceful

spring:
  application:
    name: main-api
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:tutormarket}
    username: ${POSTGRES_USER:tutormarket}
    password: ${POSTGRES_PASSWORD:tutormarket}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  platform:
    tenant-id: ${TENANT_ID:11111111-1111-1111-1111-111111111111}
  jwt:
    issuer: tutor-market-ai
    secret: ${JWT_SECRET:replace-with-a-long-secret}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:720}
  ai:
    base-url: ${AI_ORCHESTRATOR_BASE_URL:http://localhost:8090}
    model: ${OPENAI_MODEL:gpt-4.1-mini}
  storage:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    region: ${MINIO_REGION:us-east-1}
    access-key: ${MINIO_ROOT_USER:minioadmin}
    secret-key: ${MINIO_ROOT_PASSWORD:minioadmin}
    bucket: ${MINIO_BUCKET:teacher-knowledge}
    path-style-access-enabled: true

logging:
  level:
    root: INFO
    com.tutormarket.api: INFO
