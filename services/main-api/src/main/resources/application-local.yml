spring:
  datasource:
    url: jdbc:h2:file:./.data/tutormarket;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DEFAULT_NULL_ORDERING=HIGH;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

app:
  jwt:
    secret: local-dev-secret-key-with-at-least-thirty-two-bytes
  ai:
    base-url: http://localhost:8090
  storage:
    endpoint: http://localhost:9000
    bucket: teacher-knowledge
  wechat:
    open-app-id: test-app-id
    open-app-secret: test-app-secret
    redirect-uri: http://127.0.0.1:3000/login/wechat/callback
    state-ttl-seconds: 300

logging:
  level:
    root: INFO
    com.tutormarket.api: INFO
