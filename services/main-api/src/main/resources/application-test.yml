spring:
  datasource:
    url: jdbc:h2:mem:tutormarket;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

app:
  jwt:
    secret: test-secret-key-with-at-least-thirty-two-bytes
  ai:
    base-url: http://localhost:8090
  storage:
    endpoint: http://localhost:9000
    bucket: teacher-knowledge
